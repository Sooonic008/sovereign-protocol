<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Protocol | Digital Empire</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        :root {
            --gold: #D4AF37;
            --gold-bright: #F5E0A3;
            --dark: #050505;
            --card-bg: rgba(15, 15, 15, 0.9);
            --border: rgba(212, 175, 55, 0.2);
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--dark);
            color: #ffffff;
            line-height: 1.5;
            overflow-x: hidden;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

        .bg-glow {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 100vh;
            background: radial-gradient(circle at 50% -20%, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        nav {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1000;
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 90px;
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
            font-style: italic;
            cursor: pointer;
            user-select: none;
        }

        .logo span { color: var(--gold); }

        .hero {
            padding: 220px 0 120px;
            text-align: center;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold);
            margin-bottom: 40px;
            font-weight: 700;
        }

        .badge::before {
            content: "";
            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
        }

        h1 {
            font-size: clamp(48px, 10vw, 110px);
            font-weight: 900;
            line-height: 0.85;
            text-transform: uppercase;
            margin-bottom: 35px;
            font-style: italic;
            letter-spacing: -4px;
        }

        .gold-text {
            background: linear-gradient(135deg, #C5A021 0%, #F5E0A3 50%, #B8860B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
        }

        .hero p {
            font-size: 19px;
            color: rgba(255, 255, 255, 0.6);
            max-width: 650px;
            margin: 0 auto 60px;
        }

        .btn-gold {
            background: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%);
            color: #000;
            padding: 24px 60px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            display: inline-block;
            transition: all 0.4s ease;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .btn-gold:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(212, 175, 55, 0.3);
        }

        /* ADMIN PANEL OVERLAY */
        #admin-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .admin-card {
            width: 100%;
            max-width: 400px;
            background: #0a0a0a;
            border: 1px solid var(--gold);
            padding: 50px;
            border-radius: 30px;
            text-align: center;
        }

        .admin-input {
            width: 100%;
            padding: 18px;
            margin: 25px 0;
            background: #111;
            border: 1px solid #222;
            color: #fff;
            border-radius: 12px;
            text-align: center;
            font-size: 18px;
            letter-spacing: 2px;
        }

        .admin-btn {
            width: 100%;
            padding: 18px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .admin-btn:hover {
            filter: brightness(1.2);
            transform: scale(1.02);
        }

        /* NEU: TEST-MESSAGE FÜR VORSCHAU */
        #preview-note {
            display: none;
            color: #D4AF37;
            font-size: 12px;
            margin-top: 15px;
            font-weight: bold;
        }

        footer {
            padding: 100px 0 50px;
            text-align: center;
            color: rgba(255, 255, 255, 0.1);
            font-size: 10px;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <nav>
        <div class="container nav-content">
            <div class="logo" id="admin-trigger">SOV<span>ER</span>EIGN</div>
            <a href="#pricing" class="btn-gold" style="padding: 12px 25px; font-size: 11px; border-radius: 8px;">Access</a>
        </div>
    </nav>

    <div id="admin-overlay">
        <div class="admin-card">
            <div style="color: var(--gold); font-weight: 900; letter-spacing: 3px; margin-bottom: 10px;">IDENTITY CHECK</div>
            <h2 style="font-style: italic; font-size: 24px; text-transform: uppercase; margin-bottom: 5px;">Founder Login</h2>
            <p style="color: #666; font-size: 12px;">Sicherheitsschlüssel erforderlich.</p>
            
            <input type="password" id="admin-pw" class="admin-input" placeholder="••••••••">
            
            <button onclick="checkAdminPw()" class="admin-btn">Login Bestätigen</button>
            <div id="preview-note">VORSCHAU-MODUS: Weiterleitung aktiv!</div>
            <button onclick="closeAdmin()" style="margin-top:20px; background:none; border:none; color:#444; cursor:pointer; font-size:10px; text-transform:uppercase;">Abbrechen</button>
        </div>
    </div>

    <header class="hero">
        <div class="container">
            <span class="badge">Sovereign Protocol v2.4</span>
            <h1>Digital <br><span class="gold-text">Sovereignty</span></h1>
            <p>Erbaue ein unantastbares Business-Imperium mit maximaler Hebelwirkung.</p>
            <a href="saas_sovereign_blueprint.html" class="btn-gold">Das Protokoll öffnen</a>
        </div>
    </header>

    <footer>&copy; 2024 SOVEREIGN PROTOCOL</footer>

    <script>
        const MASTER_PW = "sovereign2024";
        let clickCount = 0;

        document.getElementById('admin-trigger').addEventListener('click', () => {
            clickCount++;
            if (clickCount === 5) {
                document.getElementById('admin-overlay').style.display = 'flex';
                document.getElementById('admin-pw').focus();
                clickCount = 0;
            }
        });

        function checkAdminPw() {
            const pw = document.getElementById('admin-pw').value;
            if (pw === MASTER_PW) {
                // PRÜFUNG: Sind wir in der Vorschau oder Live?
                const isPreview = window.location.hostname === "localhost" || 
                                 window.location.protocol === "blob:" || 
                                 window.location.hostname.includes("preview") || 
                                 window.location.hostname === "";

                if (isPreview) {
                    // Zeige eine Bestätigung in der Vorschau
                    document.getElementById('preview-note').innerText = "SUCCESS: Weiterleitung zu dashboard.html...";
                    document.getElementById('preview-note').style.display = "block";
                    
                    // Versuche trotzdem zu laden, damit du siehst was passiert
                    setTimeout(() => {
                        window.location.href = "dashboard.html";
                    }, 1000);
                } else {
                    // LIVE-MODUS: Direkter Wechsel
                    window.location.href = "dashboard.html";
                }
            } else {
                alert("Zugriff verweigert.");
                document.getElementById('admin-pw').value = "";
            }
        }

        function closeAdmin() {
            document.getElementById('admin-overlay').style.display = 'none';
            document.getElementById('preview-note').style.display = "none";
        }

        document.getElementById('admin-pw').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAdminPw();
        });
    </script>
</body>
</html>
