<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The SaaS Sovereign Protocol | Digitales Imperium</title>
    <link rel="preconnect" href="[https://fonts.googleapis.com](https://fonts.googleapis.com)">
    <link rel="preconnect" href="[https://fonts.gstatic.com](https://fonts.gstatic.com)" crossorigin>
    <link href="[https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;800&display=swap](https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;800&display=swap)" rel="stylesheet">
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <style>
        body { font-family: 'Urbanist', sans-serif; background-color: #050505; color: #ffffff; scroll-behavior: smooth; }
        .gold-gradient { background: linear-gradient(135deg, #C5A021 0%, #D4AF37 50%, #B8860B 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gold-bg { background: linear-gradient(135deg, #C5A021 0%, #D4AF37 100%); }
        .card-dark { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.4s ease; }
        .card-dark:hover { border-color: #C5A021; transform: translateY(-8px); }
    </style>
</head>
<body class="antialiased overflow-x-hidden">
    <nav class="max-w-7xl mx-auto flex justify-between items-center px-6 py-8 relative z-50">
        <div class="text-2xl font-800 tracking-tighter">SOV<span class="gold-gradient">ER</span>EIGN</div>
        <button onclick="scrollToPricing()" class="gold-bg text-black px-8 py-2.5 rounded-full font-bold text-xs hover:scale-105 transition active:scale-95 uppercase">Jetzt Starten</button>
    </nav>

    <header class="max-w-6xl mx-auto px-6 pt-24 pb-32 text-center relative">
        <h1 class="text-5xl md:text-8xl font-800 mb-8 leading-[0.95] tracking-tighter uppercase">Build your <br><span class="gold-gradient italic">Digital Empire</span></h1>
        <p class="text-lg md:text-xl text-gray-400 max-w-2xl mx-auto mb-12 font-medium">Verwandle Wissen in digitale Souveränität. Wir bauen dein High-Ticket SaaS Business.</p>
        <button onclick="scrollToPricing()" class="gold-bg text-black px-12 py-5 rounded-2xl font-bold text-lg transition active:scale-95 uppercase">Protokoll sichern</button>
    </header>

    <section id="pricing" class="max-w-7xl mx-auto px-6 py-32">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-5xl mx-auto">
            <div class="card-dark p-12 rounded-[40px] flex flex-col">
                <h3 class="text-xl font-bold mb-1 uppercase tracking-widest text-zinc-400">Elite Access</h3>
                <div class="text-5xl font-black mb-10 tracking-tighter italic">2.997 €</div>
                <button onclick="redirectToDigistore('elite')" class="w-full py-5 bg-white text-black font-black rounded-2xl hover:bg-zinc-200 transition uppercase">Plan wählen</button>
            </div>
            <div class="card-dark p-12 rounded-[40px] border-2 border-[#C5A021] flex flex-col bg-gradient-to-b from-[#C5A021]/5 to-transparent">
                <h3 class="text-xl font-bold mb-1 gold-gradient uppercase tracking-widest">GOTT-MODUS</h3>
                <div class="text-5xl font-black mb-10 tracking-tighter italic">5.997 €</div>
                <button onclick="redirectToDigistore('god')" class="w-full py-5 gold-bg text-black font-black rounded-2xl transition uppercase">Imperium Starten</button>
            </div>
        </div>
    </section>

    <script>
        const DIGISTORE_CONFIG = {
            vendorId: "sooonic008",
            products: { elite: "676462", god: "676464" }
        };

        function redirectToDigistore(planKey) {
            const productId = DIGISTORE_CONFIG.products[planKey];
            const vendor = DIGISTORE_CONFIG.vendorId;
            const checkoutUrl = `https://www.digistore24.com/product/${productId}?vendor=${vendor}`;
            window.location.href = checkoutUrl;
        }

        function scrollToPricing() {
            document.getElementById('pricing').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
