<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN | Dashboard</title>
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #050505;
            --panel-bg: #0a0a0a;
            --border: rgba(212, 175, 55, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--dark);
            color: #fff;
            padding: 20px;
            height: 100vh;
            overflow: hidden;
        }

        /* HEADER */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .logo { font-size: 20px; font-weight: 900; font-style: italic; letter-spacing: 1px; }
        .logo span { color: var(--gold); }

        /* MAIN GRID */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            gap: 20px;
            height: calc(100vh - 110px);
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        h2 {
            font-size: 14px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        /* METRIKEN */
        .metric { margin-bottom: 20px; }
        .metric-label { font-size: 12px; color: #666; text-transform: uppercase; }
        .metric-value { font-size: 28px; font-weight: 900; }

        /* KAUF-BUTTONS (Jetzt zu 100% sichtbar und klickbar) */
        .buy-btn {
            background: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%);
            color: #000;
            border: none;
            padding: 20px;
            border-radius: 8px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
            margin-top: auto; /* Drückt den Button immer ans untere Ende des Panels */
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
            text-decoration: none;
            text-align: center;
        }

        .buy-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4);
        }

        /* ZENTRALER BEREICH */
        .center-panel {
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #151515 0%, #0a0a0a 100%);
        }

        .status-circle {
            width: 200px;
            height: 200px;
            border: 2px dashed var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            letter-spacing: 4px;
            color: var(--gold);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <header class="top-bar">
        <div class="logo">SOV<span>ER</span>EIGN</div>
        <div style="font-size: 12px; color: #888;">STATUS: <span style="color: #00ff41;">SECURE</span></div>
    </header>

    <div class="dashboard-grid">
        
        <div class="panel">
            <h2>Financial Assets</h2>
            
            <div class="metric">
                <div class="metric-label">Current Revenue</div>
                <div class="metric-value">€ 0.00</div>
            </div>

            <div class="metric">
                <div class="metric-label">Active Nodes</div>
                <div class="metric-value">1</div>
            </div>

            <a href="DEIN_DIGISTORE_LINK_HIER" class="buy-btn">Node Hinzufügen (99€)</a>
        </div>

        <div class="panel center-panel">
            <div class="status-circle">
                <div style="animation: rotate 20s linear infinite reverse;">SYSTEM ONLINE</div>
            </div>
        </div>

        <div class="panel">
            <h2>Protocols</h2>
            
            <div class="metric">
                <div class="metric-label">Identity Protection</div>
                <div style="color: #00ff41; font-weight: bold; margin-top: 5px;">ACTIVE</div>
            </div>

            <div class="metric" style="margin-top: 30px;">
                <div class="metric-label">God Mode Unlocked</div>
                <div style="color: #666; font-weight: bold; margin-top: 5px;">LOCKED</div>
            </div>

            <a href="DEIN_DIGISTORE_LINK_HIER" class="buy-btn" style="background: transparent; border: 2px solid var(--gold); color: var(--gold);">
                Unlock God Mode (499€)
            </a>
        </div>

    </div>

</body>
</html>
