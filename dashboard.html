/* Ersetze/Ergänze dies in deinem <style> Bereich */

/* WICHTIG: Scanline darf keine Klicks blockieren */
body::before {
    content: " ";
    position: fixed;
    inset: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
    background-size: 100% 4px;
    z-index: 100;
    pointer-events: none; /* Das hier erlaubt Klicks durch den Effekt hindurch */
}

/* Optimierte Buttons für maximale Sichtbarkeit */
.btn-action {
    background: rgba(212, 175, 55, 0.1);
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 15px;
    width: 100%;
    margin-top: 15px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    z-index: 200; /* Über den Scanlines */
    overflow: hidden;
}

.btn-action:hover {
    background: var(--gold);
    color: #000;
    box-shadow: 0 0 20px var(--gold);
    transform: scale(1.02);
}

/* Goldene Akzente für die Stat-Boxen */
.stat-value {
    font-size: 32px;
    font-weight: 900;
    color: var(--gold-bright); /* Helleres Gold für mehr Kontrast */
    text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
}
